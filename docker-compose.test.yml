services:
  qdrant-test:
    image: qdrant/qdrant:latest
    container_name: qdrant-test
    ports:
      - "6333:6333"
    volumes:
      - qdrant_test_data:/qdrant/storage
    restart: unless-stopped

  rag-api-test:
    build: .
    container_name: rag-api-test
    ports:
      - "8001:8000"
    environment:
      RAG_ENV_NAME: test
      RAG_QDRANT_URL: http://qdrant-test:6333
      RAG_COLLECTION_NAME: rag_test
      RAG_DOCS_PATH: data/test/sample_docs.txt
    depends_on:
      - qdrant-test
    restart: unless-stopped

volumes:
  qdrant_test_data:
