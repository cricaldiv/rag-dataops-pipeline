name: RAG DataOps CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: "Promote to PROD"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  validate:
    name: Validate code and data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint Python
        run: |
          ruff check app tests

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest -q

      - name: Build Docker image
        run: |
          docker build -t rag-dataops:${{ github.sha }} .

  deploy-test:
    name: Deploy TEST and run smoke test
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start TEST stack
        run: |
          docker compose -f docker-compose.test.yml up -d --build

      - name: Show container status and logs
        run: |
          docker ps
          docker logs rag-api-test || true
          docker logs qdrant-test || true
          docker logs ollama-rag-test || true

      - name: Pull Ollama model
        run: |
          docker exec ollama-rag-test ollama pull llama3.2:1b

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8001/health; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API did not become ready"
          docker logs rag-api-test || true
          exit 1

      - name: Ingest TEST documents
        run: |
          curl -fsS -X POST http://localhost:8001/ingest

      - name: TEST RAG smoke query
        run: |
          curl -fsS -G http://localhost:8001/ask --data-urlencode "question=what stores logs" | tee response.json
          grep -i "loki" response.json

      - name: Show logs after failure
        run: |
          docker logs rag-api-test || true
          docker logs ollama-rag-test || true

  deploy-prod:
    name: Deploy PROD with manual approval
    runs-on: ubuntu-latest
    needs: deploy-test
    if: github.event_name == 'workflow_dispatch' && inputs.promote_to_prod == 'true'
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repository files
        run: |
          pwd
          ls -la
          git rev-parse HEAD

      - name: Start PROD stack
        run: |
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Show container logs (PROD)
        run: |
          docker ps
          docker logs rag-api-prod || true
          docker logs ollama-rag-prod || true

      - name: Pull Ollama model (PROD)
        run: |
          docker exec ollama-rag-prod ollama pull llama3.2:1b

      - name: Wait for API (PROD)
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8002/health; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          docker logs rag-api-prod || true
          exit 1

      - name: Ingest PROD approved documents
        run: |
          curl -X POST http://localhost:8002/ingest

      - name: PROD RAG smoke query
        run: |
          curl -fsS -G http://localhost:8002/ask --data-urlencode "question=what requires approval before production" | tee response.json
          grep -i "approved" response.json